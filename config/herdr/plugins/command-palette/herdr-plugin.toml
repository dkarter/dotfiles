id = "dotfiles.command-palette"
name = "Command Palette"
version = "0.1.0"
min_herdr_version = "0.7.4"
description = "Dotfiles Herdr command palette"
platforms = ["macos", "linux"]

[[actions]]
id = "open"
title = "Open command palette"
contexts = ["workspace"]
command = ["./open"]

[[actions]]
id = "new-worktree"
title = "New worktree"
contexts = ["workspace"]
command = ["./open-worktree"]

[[actions]]
id = "new-agent-with-prompt"
title = "New agent with prompt"
contexts = ["workspace"]
command = ["./open-agent-prompt"]

[[panes]]
id = "palette"
title = "Command Palette"
placement = "popup"
width = "80%"
height = "60%"
command = ["./palette"]

[[panes]]
id = "worktree"
title = "New Worktree"
placement = "overlay"
command = ["./worktree"]

[[panes]]
id = "agent-prompt"
title = "New Agent With Prompt"
placement = "overlay"
command = ["./agent-prompt"]
