onboarding = false

[theme]
name = "tokyo-night"

[ui.sound]
enabled = true

[ui.toast]
delivery = "system"

[ui]
show_agent_labels_on_pane_borders = true
agent_panel_scope = "current"

[keys]
prefix = "ctrl+z"
focus_pane_left = "ctrl+h"
focus_pane_down = "ctrl+j"
focus_pane_up = "ctrl+k"
focus_pane_right = "ctrl+l"
split_vertical = "prefix+\\"
