onboarding = false

[theme]
name = "tokyo-night"

[ui.sound]
enabled = true

[ui.toast]
delivery = "terminal"

[ui]
show_agent_labels_on_pane_borders = true
sidebar_collapsed_mode = "hidden"
hide_tab_bar_when_single_tab = true

agent_panel_sort = "priority"
[ui.sidebar.agents]
rows = [
  [
    "state_icon",
    { token = "workspace", bold = true },
    { token = "$pr", fg = "#bb9af7" },
  ],
  [
    { token = "agent", fg = "#7dcfff" },
  ],
]

[ui.sidebar.agents.rows_by_agent]
claude = [
  [
    "state_icon",
    { token = "workspace", bold = true },
    { token = "$pr", fg = "#bb9af7" },
  ],
  [
    { token = "terminal_title_stripped", fg = "#c0caf5" },
  ],
]
opencode = [
  [
    "state_icon",
    { token = "workspace", bold = true },
    { token = "$pr", fg = "#bb9af7" },
  ],
  [
    { token = "terminal_title_stripped", fg = "#c0caf5" },
  ],
]

[keys]
prefix = "ctrl+z"

close_workspace = "prefix+shift+x"
detach = "prefix+d"
focus_agent = "prefix+alt+1..9"
focus_pane_down = ""
focus_pane_left = ""
focus_pane_right = ""
focus_pane_up = ""
goto = "prefix+shift+w"
navigate_workspace_down = "j"
navigate_workspace_up = "k"
next_workspace = "ctrl+]"
previous_workspace = "ctrl+["
reload_config = "prefix+shift+r"
remove_worktree = "prefix+shift+d"
rename_pane = "prefix+<"
rename_tab = "prefix+,"
rename_workspace = "prefix+r"
split_vertical = "prefix+\\"
switch_tab = "prefix+1..9"
switch_workspace = "prefix+shift+1..9"

[[keys.command]]
key = "prefix+shift+t"
type = "plugin_action"
command = "dotfiles.command-palette.open-workspace-picker"
description = "jump to workspace"

[[keys.command]]
key = "prefix+shift+p"
type = "plugin_action"
command = "dotfiles.command-palette.open"
description = "command palette"

[[keys.command]]
key = "prefix+shift+o"
type = "popup"
command = "herdr-open-dev-dir"
description = "open dev directory"
width = "80%"
height = "80%"

[[keys.command]]
key = "prefix+shift+a"
type = "popup"
command = "herdr-popup-insert-file-path"
description = "insert file path at cursor"
width = "80%"
height = "80%"

[[keys.command]]
key = "ctrl+h"
type = "plugin_action"
command = "dotfiles.seamless-navigation.navigate-left"
description = "navigate left"

[[keys.command]]
key = "ctrl+j"
type = "plugin_action"
command = "dotfiles.seamless-navigation.navigate-down"
description = "navigate down"

[[keys.command]]
key = "ctrl+k"
type = "plugin_action"
command = "dotfiles.seamless-navigation.navigate-up"
description = "navigate up"

[[keys.command]]
key = "ctrl+l"
type = "plugin_action"
command = "dotfiles.seamless-navigation.navigate-right"
description = "navigate right"

[[keys.command]]
key = "alt+h"
type = "plugin_action"
command = "dotfiles.seamless-navigation.resize-left"
description = "resize left"

[[keys.command]]
key = "alt+j"
type = "plugin_action"
command = "dotfiles.seamless-navigation.resize-down"
description = "resize down"

[[keys.command]]
key = "alt+k"
type = "plugin_action"
command = "dotfiles.seamless-navigation.resize-up"
description = "resize up"

[[keys.command]]
key = "alt+l"
type = "plugin_action"
command = "dotfiles.seamless-navigation.resize-right"
description = "resize right"

[[keys.command]]
key = "prefix+u"
type = "plugin_action"
command = "gh-pr.open-pr"
description = "open PR in browser"
