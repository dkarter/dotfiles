[metadata]
name = "elixir-tests"
description = "A channel to select elixir tests"
requirements = ["fd"]

[source]
command = ["fd -t f _test.exs"]

[keybindings]
ctrl-e = "actions:edit"

[actions.edit]
description = "Opens the selected entries with the default editor (falls back to vim)"
command = "${EDITOR:-vim} '{}'"
mode = "execute"
