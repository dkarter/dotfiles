# yaml-language-server: $schema=https://json.schemastore.org/github-workflow.json

name: Mise OCI

on:
  workflow_dispatch:

  push:
    branches: [master]
    paths:
      - .github/workflows/mise-oci.yml
      - config/mise/config.toml
      - config/mise/mise.lock
      - mise.lock
      - mise.toml

permissions:
  contents: read
  packages: write

concurrency:
  group: ${{ github.workflow }}-${{ github.ref_name }}
  cancel-in-progress: true

jobs:
  build-and-push:
    name: Build and Push (${{ matrix.arch }})

    runs-on: ${{ matrix.runner }}

    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: amd64
            runner: ubuntu-latest
          - arch: arm64
            runner: ubuntu-24.04-arm

    env:
      MISE_EXPERIMENTAL: 1

    steps:
      - name: Checkout
        shell: bash
        run: |
          git init .
          git remote add origin "${GITHUB_SERVER_URL}/${GITHUB_REPOSITORY}.git"
          basic_auth="$(printf 'x-access-token:%s' "${GITHUB_TOKEN}" | base64 --wrap=0)"
          git \
            -c "http.${GITHUB_SERVER_URL}/.extraheader=AUTHORIZATION: basic ${basic_auth}" \
            fetch \
            --depth=1 \
            --no-tags \
            origin \
            "${GITHUB_SHA}"
          git checkout --detach FETCH_HEAD
        env:
          GITHUB_TOKEN: ${{ github.token }}

      - name: Install system dependencies
        run: sudo apt-get update && sudo apt-get install -y libreadline-dev skopeo

      - name: Install Runtimes w/ MISE
        uses: jdx/mise-action@abadabdb1fdc80cf6563f9bd749bf473c860bb5e
        with:
          install: false

      - name: Prepare OCI mise config
        shell: bash
        run: |
          config_dir="${RUNNER_TEMP}/mise-oci-config"
          mkdir -p "${config_dir}"
          declare -A seen_tools=()

          trim() {
            local value="$1"
            value="${value#"${value%%[![:space:]]*}"}"
            value="${value%"${value##*[![:space:]]}"}"
            printf '%s' "${value}"
          }

          should_skip_tool() {
            local key="$1"

            # VM/runtime host tools do not make sense inside the container image.
            if [[ "${key}" == 'colima' || "${key}" == 'lima' ]]; then
              return 0
            fi

            # lolcrab does not publish a Linux arm64 artifact.
            if [[ "${ARCH}" == 'arm64' && "${key}" == '"github:mazznoer/lolcrab"' ]]; then
              return 0
            fi

            # The current resvg backend does not support Linux arm64.
            if [[ "${ARCH}" == 'arm64' && "${key}" == 'resvg' ]]; then
              return 0
            fi

            return 1
          }

          append_tools_from() {
            local source_file="$1"
            local in_tools=0

            while IFS= read -r line; do
              if [[ "${line}" == '[tools]' ]]; then
                in_tools=1
                continue
              fi

              if [[ "${line}" == \[* ]]; then
                in_tools=0
              fi

              if [[ "${in_tools}" != 1 || -z "${line}" || "${line}" == '#'* || "${line}" != *'='* ]]; then
                continue
              fi

              key="$(trim "${line%%=*}")"

              if should_skip_tool "${key}" || [[ -n "${seen_tools[${key}]+x}" ]]; then
                continue
              fi

              seen_tools["${key}"]=1
              echo "${line}"
            done < "${source_file}"
          }

          {
            echo '[tools]'
            append_tools_from mise.toml
            append_tools_from config/mise/config.toml

            echo
            echo '[settings]'
            echo 'experimental = true'
            echo 'disable_backends = ["asdf"]'
            echo 'npm.bun = true'
            echo 'ruby.compile = false'
            echo 'cargo.binstall = true'
            echo 'python.compile = false'
            echo 'lockfile = true'
          } > "${config_dir}/mise.toml"

          {
            echo '# @generated - combined project/global lockfile for the OCI build'
            echo
            sed '1,2d' mise.lock
            sed '1,2d' config/mise/mise.lock
          } > "${config_dir}/mise.lock"
        env:
          ARCH: ${{ matrix.arch }}

      - name: Install OCI tools
        run: mise -C "${RUNNER_TEMP}/mise-oci-config" install

      - name: Prepare image tags
        id: meta
        shell: bash
        run: |
          image="ghcr.io/${GITHUB_REPOSITORY,,}"
          branch_tag="${GITHUB_REF_NAME//\//-}"
          short_sha="${GITHUB_SHA::12}"

          {
            echo "image=${image}"
            echo "branch_arch=${image}:${branch_tag}-${ARCH}"
            echo "latest_arch=${image}:latest-${ARCH}"
            echo "sha_arch=${image}:${short_sha}-${ARCH}"
          } >> "$GITHUB_OUTPUT"
        env:
          ARCH: ${{ matrix.arch }}

      - name: Use temporary registry auth file
        shell: bash
        run: echo "REGISTRY_AUTH_FILE=${RUNNER_TEMP}/containers-auth.json" >> "$GITHUB_ENV"

      - name: Log in to GHCR
        shell: bash
        run: |
          mkdir -p "$(dirname "${REGISTRY_AUTH_FILE}")"
          printf '%s' "${GITHUB_TOKEN}" | skopeo login --authfile "${REGISTRY_AUTH_FILE}" ghcr.io --username "${GITHUB_ACTOR}" --password-stdin
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Build OCI image
        shell: bash
        run: |
          SOURCE_DATE_EPOCH="$(git log -1 --format=%ct)" mise -C "${RUNNER_TEMP}/mise-oci-config" oci build \
            --from mcr.microsoft.com/devcontainers/base:debian-13 \
            --output "${PWD}/mise-oci" \
            --tag "${{ steps.meta.outputs.sha_arch }}"

      - name: Export OCI image for scanning
        run: skopeo copy "oci:${PWD}/mise-oci" "docker-archive:${RUNNER_TEMP}/mise-oci.tar:${{ steps.meta.outputs.sha_arch }}"

      - name: Scan OCI image for secrets
        run: |
          mise x aqua:aquasecurity/trivy@latest -- trivy image \
            --input "${RUNNER_TEMP}/mise-oci.tar" \
            --scanners secret \
            --image-config-scanners secret \
            --skip-dirs /mise \
            --skip-files '/mise/installs/go/*/src/crypto/x509/platform_root_key.pem' \
            --skip-db-update \
            --no-progress \
            --exit-code 1

      - name: Report OCI image critical vulnerabilities
        run: |
          mise x aqua:aquasecurity/trivy@latest -- trivy image \
            --input "${RUNNER_TEMP}/mise-oci.tar" \
            --scanners vuln \
            --severity CRITICAL \
            --ignore-unfixed \
            --no-progress

      - name: Push OCI image
        shell: bash
        run: |
          mise oci push --image-dir ./mise-oci "${{ steps.meta.outputs.sha_arch }}"
          mise oci push --image-dir ./mise-oci "${{ steps.meta.outputs.branch_arch }}"

          if [[ "${GITHUB_REF_NAME}" == "${DEFAULT_BRANCH}" ]]; then
            mise oci push --image-dir ./mise-oci "${{ steps.meta.outputs.latest_arch }}"
          fi
        env:
          DEFAULT_BRANCH: ${{ github.event.repository.default_branch }}

      - name: Remove GHCR credentials
        if: always()
        shell: bash
        run: |
          skopeo logout --authfile "${REGISTRY_AUTH_FILE}" ghcr.io || true
          rm -f "${REGISTRY_AUTH_FILE}"

  publish-manifests:
    name: Publish Multi-Arch Manifests

    runs-on: ubuntu-latest
    needs: build-and-push

    steps:
      - name: Prepare image tags
        id: meta
        shell: bash
        run: |
          image="ghcr.io/${GITHUB_REPOSITORY,,}"
          branch_tag="${GITHUB_REF_NAME//\//-}"
          short_sha="${GITHUB_SHA::12}"

          {
            echo "branch=${image}:${branch_tag}"
            echo "branch_amd64=${image}:${branch_tag}-amd64"
            echo "branch_arm64=${image}:${branch_tag}-arm64"
            echo "latest=${image}:latest"
            echo "latest_amd64=${image}:latest-amd64"
            echo "latest_arm64=${image}:latest-arm64"
            echo "sha=${image}:${short_sha}"
            echo "sha_amd64=${image}:${short_sha}-amd64"
            echo "sha_arm64=${image}:${short_sha}-arm64"
          } >> "$GITHUB_OUTPUT"

      - name: Use temporary Docker config
        shell: bash
        run: |
          docker_config="${RUNNER_TEMP}/docker-config"
          mkdir -p "${docker_config}"
          chmod 700 "${docker_config}"
          echo "DOCKER_CONFIG=${docker_config}" >> "$GITHUB_ENV"

      - name: Log in to GHCR
        uses: docker/login-action@v4.2.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Publish manifest tags
        shell: bash
        run: |
          docker buildx imagetools create \
            --tag "${{ steps.meta.outputs.sha }}" \
            "${{ steps.meta.outputs.sha_amd64 }}" \
            "${{ steps.meta.outputs.sha_arm64 }}"

          docker buildx imagetools create \
            --tag "${{ steps.meta.outputs.branch }}" \
            "${{ steps.meta.outputs.branch_amd64 }}" \
            "${{ steps.meta.outputs.branch_arm64 }}"

          if [[ "${GITHUB_REF_NAME}" == "${DEFAULT_BRANCH}" ]]; then
            docker buildx imagetools create \
              --tag "${{ steps.meta.outputs.latest }}" \
              "${{ steps.meta.outputs.latest_amd64 }}" \
              "${{ steps.meta.outputs.latest_arm64 }}"
          fi
        env:
          DEFAULT_BRANCH: ${{ github.event.repository.default_branch }}

      - name: Inspect manifest
        run: docker buildx imagetools inspect "${{ steps.meta.outputs.sha }}"
