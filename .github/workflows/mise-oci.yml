# yaml-language-server: $schema=https://json.schemastore.org/github-workflow.json

name: Mise OCI

on:
  workflow_dispatch:

  push:
    branches: [master]
    paths:
      - .github/workflows/mise-oci.yml
      - mise.lock
      - mise.toml

permissions:
  contents: read
  packages: write

concurrency:
  group: ${{ github.workflow }}-${{ github.ref_name }}
  cancel-in-progress: true

jobs:
  build-and-push:
    name: Build and Push (${{ matrix.arch }})

    runs-on: ${{ matrix.runner }}

    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: amd64
            runner: ubuntu-latest
          - arch: arm64
            runner: ubuntu-24.04-arm

    env:
      MISE_EXPERIMENTAL: 1

    steps:
      - name: Checkout
        shell: bash
        run: |
          git init .
          git remote add origin "${GITHUB_SERVER_URL}/${GITHUB_REPOSITORY}.git"
          basic_auth="$(printf 'x-access-token:%s' "${GITHUB_TOKEN}" | base64 --wrap=0)"
          git \
            -c "http.${GITHUB_SERVER_URL}/.extraheader=AUTHORIZATION: basic ${basic_auth}" \
            fetch \
            --depth=1 \
            --no-tags \
            origin \
            "${GITHUB_SHA}"
          git checkout --detach FETCH_HEAD
        env:
          GITHUB_TOKEN: ${{ github.token }}

      - name: Install system dependencies
        run: sudo apt-get update && sudo apt-get install -y libreadline-dev skopeo

      - name: Install Runtimes w/ MISE
        uses: jdx/mise-action@abadabdb1fdc80cf6563f9bd749bf473c860bb5e
        with:
          install: false

      - name: Prepare OCI mise config
        shell: bash
        run: |
          config_dir="${RUNNER_TEMP}/mise-oci-config"
          mkdir -p "${config_dir}"

          {
            echo '[tools]'

            in_tools=0
            while IFS= read -r line; do
              if [[ "${line}" == '[tools]' ]]; then
                in_tools=1
                continue
              fi

              if [[ "${line}" == \[* ]]; then
                in_tools=0
              fi

              if [[ "${in_tools}" == 1 && -n "${line}" ]]; then
                if [[ "${ARCH}" == 'arm64' && "${line}" == *'github:mazznoer/lolcrab'* ]]; then
                  continue
                fi

                echo "${line}"
              fi
            done < mise.toml

            echo
            echo '[settings]'
            echo 'experimental = true'
            echo 'lockfile = true'
          } > "${config_dir}/mise.toml"

          cp mise.lock "${config_dir}/mise.lock"
        env:
          ARCH: ${{ matrix.arch }}

      - name: Install OCI tools
        run: mise -C "${RUNNER_TEMP}/mise-oci-config" install

      - name: Prepare image tags
        id: meta
        shell: bash
        run: |
          image="ghcr.io/${GITHUB_REPOSITORY,,}"
          branch_tag="${GITHUB_REF_NAME//\//-}"
          short_sha="${GITHUB_SHA::12}"

          {
            echo "image=${image}"
            echo "branch_arch=${image}:${branch_tag}-${ARCH}"
            echo "latest_arch=${image}:latest-${ARCH}"
            echo "sha_arch=${image}:${short_sha}-${ARCH}"
          } >> "$GITHUB_OUTPUT"
        env:
          ARCH: ${{ matrix.arch }}

      - name: Log in to GHCR
        run: skopeo login ghcr.io --username "${GITHUB_ACTOR}" --password-stdin <<< "${GITHUB_TOKEN}"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Build OCI image
        shell: bash
        run: |
          SOURCE_DATE_EPOCH="$(git log -1 --format=%ct)" mise -C "${RUNNER_TEMP}/mise-oci-config" oci build \
            --output "${PWD}/mise-oci" \
            --tag "${{ steps.meta.outputs.sha_arch }}"

      - name: Push OCI image
        shell: bash
        run: |
          mise oci push --image-dir ./mise-oci "${{ steps.meta.outputs.sha_arch }}"
          mise oci push --image-dir ./mise-oci "${{ steps.meta.outputs.branch_arch }}"

          if [[ "${GITHUB_REF_NAME}" == "${DEFAULT_BRANCH}" ]]; then
            mise oci push --image-dir ./mise-oci "${{ steps.meta.outputs.latest_arch }}"
          fi
        env:
          DEFAULT_BRANCH: ${{ github.event.repository.default_branch }}

  publish-manifests:
    name: Publish Multi-Arch Manifests

    runs-on: ubuntu-latest
    needs: build-and-push

    steps:
      - name: Prepare image tags
        id: meta
        shell: bash
        run: |
          image="ghcr.io/${GITHUB_REPOSITORY,,}"
          branch_tag="${GITHUB_REF_NAME//\//-}"
          short_sha="${GITHUB_SHA::12}"

          {
            echo "branch=${image}:${branch_tag}"
            echo "branch_amd64=${image}:${branch_tag}-amd64"
            echo "branch_arm64=${image}:${branch_tag}-arm64"
            echo "latest=${image}:latest"
            echo "latest_amd64=${image}:latest-amd64"
            echo "latest_arm64=${image}:latest-arm64"
            echo "sha=${image}:${short_sha}"
            echo "sha_amd64=${image}:${short_sha}-amd64"
            echo "sha_arm64=${image}:${short_sha}-arm64"
          } >> "$GITHUB_OUTPUT"

      - name: Log in to GHCR
        run: docker login ghcr.io --username "${GITHUB_ACTOR}" --password-stdin <<< "${GITHUB_TOKEN}"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Publish manifest tags
        shell: bash
        run: |
          docker buildx imagetools create \
            --tag "${{ steps.meta.outputs.sha }}" \
            "${{ steps.meta.outputs.sha_amd64 }}" \
            "${{ steps.meta.outputs.sha_arm64 }}"

          docker buildx imagetools create \
            --tag "${{ steps.meta.outputs.branch }}" \
            "${{ steps.meta.outputs.branch_amd64 }}" \
            "${{ steps.meta.outputs.branch_arm64 }}"

          if [[ "${GITHUB_REF_NAME}" == "${DEFAULT_BRANCH}" ]]; then
            docker buildx imagetools create \
              --tag "${{ steps.meta.outputs.latest }}" \
              "${{ steps.meta.outputs.latest_amd64 }}" \
              "${{ steps.meta.outputs.latest_arm64 }}"
          fi
        env:
          DEFAULT_BRANCH: ${{ github.event.repository.default_branch }}

      - name: Inspect manifest
        run: docker buildx imagetools inspect "${{ steps.meta.outputs.sha }}"
