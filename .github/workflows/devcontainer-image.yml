# yaml-language-server: $schema=https://json.schemastore.org/github-workflow.json

name: Devcontainer Image

on:
  workflow_dispatch:

  push:
    branches: [master]
    paths-ignore:
      - CHANGELOG.md
      - README.md
      - docs/**

permissions:
  contents: read
  packages: write

concurrency:
  group: ${{ github.workflow }}-${{ github.ref_name }}
  cancel-in-progress: true

jobs:
  build-and-push:
    name: Build and Push (${{ matrix.arch }})

    runs-on: ${{ matrix.runner }}

    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: amd64
            runner: ubuntu-latest
          - arch: arm64
            runner: ubuntu-24.04-arm

    steps:
      - name: Checkout
        shell: bash
        run: |
          git init .
          git remote add origin "${GITHUB_SERVER_URL}/${GITHUB_REPOSITORY}.git"
          basic_auth="$(printf 'x-access-token:%s' "${GITHUB_TOKEN}" | base64 --wrap=0)"
          git \
            -c "http.${GITHUB_SERVER_URL}/.extraheader=AUTHORIZATION: basic ${basic_auth}" \
            fetch \
            --depth=1 \
            --no-tags \
            origin \
            "${GITHUB_SHA}"
          git checkout --detach FETCH_HEAD
        env:
          GITHUB_TOKEN: ${{ github.token }}

      - name: Prepare image tags
        id: meta
        shell: bash
        run: |
          image="ghcr.io/${GITHUB_REPOSITORY_OWNER,,}/dotfiles-devcontainer"
          branch_tag="${GITHUB_REF_NAME//\//-}"
          short_sha="${GITHUB_SHA::12}"

          {
            echo "branch_arch=${image}:${branch_tag}-${ARCH}"
            echo "sha_arch=${image}:${short_sha}-${ARCH}"
          } >> "$GITHUB_OUTPUT"
        env:
          ARCH: ${{ matrix.arch }}

      - name: Log in to GHCR
        run: docker login ghcr.io --username "${GITHUB_ACTOR}" --password-stdin <<< "${GITHUB_TOKEN}"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Build image
        shell: bash
        run: |
          docker buildx build \
            --file .devcontainer/Dockerfile.prebuilt \
            --platform "linux/${ARCH}" \
            --tag "${{ steps.meta.outputs.sha_arch }}" \
            --tag "${{ steps.meta.outputs.branch_arch }}" \
            --load \
            .
        env:
          ARCH: ${{ matrix.arch }}

      - name: Scan image for secrets
        shell: bash
        run: |
          mkdir -p "${RUNNER_TEMP}/trivy-cache"
          docker run --rm \
            -v /var/run/docker.sock:/var/run/docker.sock \
            -v "${RUNNER_TEMP}/trivy-cache:/root/.cache/" \
            aquasec/trivy:0.70.0 \
            image \
            --scanners secret \
            --image-config-scanners secret \
            --skip-files '/mise/installs/go/*/src/crypto/x509/platform_root_key.pem' \
            --skip-db-update \
            --no-progress \
            --exit-code 1 \
            "${{ steps.meta.outputs.sha_arch }}"

      - name: Push image
        shell: bash
        run: |
          docker push "${{ steps.meta.outputs.sha_arch }}"
          docker push "${{ steps.meta.outputs.branch_arch }}"

  publish-manifests:
    name: Publish Multi-Arch Manifests

    runs-on: ubuntu-latest
    needs: build-and-push

    steps:
      - name: Prepare image tags
        id: meta
        shell: bash
        run: |
          image="ghcr.io/${GITHUB_REPOSITORY_OWNER,,}/dotfiles-devcontainer"
          branch_tag="${GITHUB_REF_NAME//\//-}"
          short_sha="${GITHUB_SHA::12}"

          {
            echo "branch=${image}:${branch_tag}"
            echo "branch_amd64=${image}:${branch_tag}-amd64"
            echo "branch_arm64=${image}:${branch_tag}-arm64"
            echo "latest=${image}:latest"
            echo "latest_amd64=${image}:latest-amd64"
            echo "latest_arm64=${image}:latest-arm64"
            echo "sha=${image}:${short_sha}"
            echo "sha_amd64=${image}:${short_sha}-amd64"
            echo "sha_arm64=${image}:${short_sha}-arm64"
          } >> "$GITHUB_OUTPUT"

      - name: Log in to GHCR
        run: docker login ghcr.io --username "${GITHUB_ACTOR}" --password-stdin <<< "${GITHUB_TOKEN}"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Publish manifest tags
        shell: bash
        run: |
          docker buildx imagetools create \
            --tag "${{ steps.meta.outputs.sha }}" \
            "${{ steps.meta.outputs.sha_amd64 }}" \
            "${{ steps.meta.outputs.sha_arm64 }}"

          docker buildx imagetools create \
            --tag "${{ steps.meta.outputs.branch }}" \
            "${{ steps.meta.outputs.branch_amd64 }}" \
            "${{ steps.meta.outputs.branch_arm64 }}"

          if [[ "${GITHUB_REF_NAME}" == "${DEFAULT_BRANCH}" ]]; then
            docker buildx imagetools create \
              --tag "${{ steps.meta.outputs.latest }}" \
              "${{ steps.meta.outputs.latest_amd64 }}" \
              "${{ steps.meta.outputs.latest_arm64 }}"
          fi
        env:
          DEFAULT_BRANCH: ${{ github.event.repository.default_branch }}

      - name: Inspect manifest
        run: docker buildx imagetools inspect "${{ steps.meta.outputs.sha }}"
