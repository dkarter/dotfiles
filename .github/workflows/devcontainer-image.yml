# yaml-language-server: $schema=https://json.schemastore.org/github-workflow.json

name: Devcontainer Image

on:
  workflow_dispatch:

  push:
    branches: [master]
    paths-ignore:
      - CHANGELOG.md
      - README.md
      - docs/**

permissions:
  contents: read
  packages: write

concurrency:
  group: ${{ github.workflow }}-${{ github.ref_name }}
  cancel-in-progress: true

jobs:
  build-and-push:
    name: Build and Push (${{ matrix.arch }})

    runs-on: ${{ matrix.runner }}

    strategy:
      fail-fast: false
      max-parallel: 2
      matrix:
        include:
          - arch: amd64
            runner: ubuntu-latest
          - arch: arm64
            runner: ubuntu-24.04-arm

    steps:
      - name: Checkout
        uses: actions/checkout@v6.0.2
        with:
          persist-credentials: false

      - name: Prepare image tags
        id: meta
        shell: bash
        run: |
          image="ghcr.io/${GITHUB_REPOSITORY_OWNER,,}/dotfiles-devcontainer"
          branch_tag="${GITHUB_REF_NAME//\//-}"
          short_sha="${GITHUB_SHA::12}"

          {
            echo "branch_arch=${image}:${branch_tag}-${ARCH}"
            echo "cache=${image}:buildcache-${ARCH}"
            echo "sha_arch=${image}:${short_sha}-${ARCH}"
          } >> "$GITHUB_OUTPUT"
        env:
          ARCH: ${{ matrix.arch }}

      - name: Prepare setup cache key
        id: setup-cache
        shell: bash
        run: |
          setup_layer_hash="$(git ls-files -s -- \
            .devcontainer/Dockerfile.prebuilt \
            .dockerignore \
            Taskfile.dist.yml \
            aliases ctags gemrc gitconfig gitignore gitmessage ignore pgpass prettierrc pryrc psqlrc stylelintrc zinitrc zshenv zshrc \
            config \
            installer \
            mise.lock mise.toml \
            scripts \
            setup.sh \
            taskfiles \
            | sha256sum \
            | cut -d ' ' -f 1)"

          echo "hash=${setup_layer_hash}" >> "$GITHUB_OUTPUT"

      - name: Use temporary Docker config
        shell: bash
        run: echo "DOCKER_CONFIG=${RUNNER_TEMP}/docker-config" >> "$GITHUB_ENV"

      - name: Log in to GHCR
        shell: bash
        run: |
          mkdir -p "${DOCKER_CONFIG}"
          chmod 700 "${DOCKER_CONFIG}"
          printf '%s' "${GITHUB_TOKEN}" | docker login ghcr.io --username "${GITHUB_ACTOR}" --password-stdin
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Buildx builder
        shell: bash
        run: |
          docker buildx create --use --driver docker-container --name dotfiles-builder
          docker buildx inspect --bootstrap

      - name: Build image
        shell: bash
        run: |
          docker buildx build \
            --file .devcontainer/Dockerfile.prebuilt \
            --platform "linux/${ARCH}" \
            --build-arg "SETUP_LAYER_HASH=${{ steps.setup-cache.outputs.hash }}" \
            --secret id=github_token,env=GITHUB_TOKEN \
            --cache-from "type=registry,ref=${{ steps.meta.outputs.cache }}" \
            --cache-to "type=registry,ref=${{ steps.meta.outputs.cache }},mode=max" \
            --tag "${{ steps.meta.outputs.sha_arch }}" \
            --tag "${{ steps.meta.outputs.branch_arch }}" \
            --load \
            .
        env:
          ARCH: ${{ matrix.arch }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Scan image for secrets
        shell: bash
        run: |
          mkdir -p "${RUNNER_TEMP}/trivy-cache"
          docker run --rm \
            -v /var/run/docker.sock:/var/run/docker.sock \
            -v "${RUNNER_TEMP}/trivy-cache:/root/.cache/" \
            aquasec/trivy:0.70.0 \
            image \
            --scanners secret \
            --image-config-scanners secret \
            --skip-dirs /mise \
            --skip-dirs /opt/dotfiles/config/opencode/node_modules \
            --skip-dirs /root/.bun \
            --skip-dirs /root/.cache \
            --skip-dirs /root/.cargo \
            --skip-dirs /root/.local/share/mise \
            --skip-dirs /root/.local/share/nvim/lazy \
            --skip-dirs /root/.local/share/nvim/mason \
            --skip-dirs /root/.local/share/pnpm \
            --skip-dirs /root/.local/share/uv \
            --skip-dirs /root/.local/share/zinit \
            --skip-dirs /root/.local/state/nvim \
            --skip-dirs /root/.npm \
            --skip-dirs /root/.rustup \
            --skip-dirs /root/go \
            --skip-files '/root/.local/share/mise/installs/go/*/src/crypto/x509/platform_root_key.pem' \
            --skip-files '/root/.local/share/nvim/lazy/kulala.nvim/doc/kulala.dynamically-setting-environment-variables-based-on-response-json.txt' \
            --skip-db-update \
            --no-progress \
            --exit-code 1 \
            "${{ steps.meta.outputs.sha_arch }}"

      - name: Push image
        shell: bash
        run: |
          docker push "${{ steps.meta.outputs.sha_arch }}"
          docker push "${{ steps.meta.outputs.branch_arch }}"

      - name: Remove GHCR credentials
        if: always()
        shell: bash
        run: |
          docker logout ghcr.io || true
          rm -rf "${DOCKER_CONFIG}"

  publish-manifests:
    name: Publish Multi-Arch Manifests

    runs-on: ubuntu-latest
    needs: build-and-push

    steps:
      - name: Prepare image tags
        id: meta
        shell: bash
        run: |
          image="ghcr.io/${GITHUB_REPOSITORY_OWNER,,}/dotfiles-devcontainer"
          branch_tag="${GITHUB_REF_NAME//\//-}"
          short_sha="${GITHUB_SHA::12}"

          {
            echo "branch=${image}:${branch_tag}"
            echo "branch_amd64=${image}:${branch_tag}-amd64"
            echo "branch_arm64=${image}:${branch_tag}-arm64"
            echo "latest=${image}:latest"
            echo "sha=${image}:${short_sha}"
            echo "sha_amd64=${image}:${short_sha}-amd64"
            echo "sha_arm64=${image}:${short_sha}-arm64"
          } >> "$GITHUB_OUTPUT"

      - name: Use temporary Docker config
        shell: bash
        run: echo "DOCKER_CONFIG=${RUNNER_TEMP}/docker-config" >> "$GITHUB_ENV"

      - name: Log in to GHCR
        shell: bash
        run: |
          mkdir -p "${DOCKER_CONFIG}"
          chmod 700 "${DOCKER_CONFIG}"
          printf '%s' "${GITHUB_TOKEN}" | docker login ghcr.io --username "${GITHUB_ACTOR}" --password-stdin
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Publish manifest tags
        shell: bash
        run: |
          docker buildx imagetools create \
            --tag "${{ steps.meta.outputs.sha }}" \
            "${{ steps.meta.outputs.sha_amd64 }}" \
            "${{ steps.meta.outputs.sha_arm64 }}"

          docker buildx imagetools create \
            --tag "${{ steps.meta.outputs.branch }}" \
            "${{ steps.meta.outputs.branch_amd64 }}" \
            "${{ steps.meta.outputs.branch_arm64 }}"

          if [[ "${GITHUB_REF_NAME}" == "${DEFAULT_BRANCH}" ]]; then
            docker buildx imagetools create \
              --tag "${{ steps.meta.outputs.latest }}" \
              "${{ steps.meta.outputs.sha_amd64 }}" \
              "${{ steps.meta.outputs.sha_arm64 }}"
          fi
        env:
          DEFAULT_BRANCH: ${{ github.event.repository.default_branch }}

      - name: Inspect manifest
        run: docker buildx imagetools inspect "${{ steps.meta.outputs.sha }}"

      - name: Remove GHCR credentials
        if: always()
        shell: bash
        run: |
          docker logout ghcr.io || true
          rm -rf "${DOCKER_CONFIG}"
