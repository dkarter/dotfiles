[bootstrap.hooks.pre-packages]
run = '''
case "$(uname)" in
  Darwin)
    if ! command -v brew >/dev/null 2>&1; then
      NONINTERACTIVE=1 /bin/bash -c "$(curl -fsSL https://raw.githubusercontent.com/Homebrew/install/HEAD/install.sh)"
      if [ -x /opt/homebrew/bin/brew ]; then
        eval "$(/opt/homebrew/bin/brew shellenv)"
      else
        eval "$(/usr/local/bin/brew shellenv)"
      fi
    fi
    if mise bootstrap packages status --missing --quiet; then
      mise bootstrap packages upgrade --manager brew --yes
      mise bootstrap packages upgrade --manager brew-cask --yes
    fi
    ;;
  Linux)
    if command -v apt-get >/dev/null 2>&1 && mise bootstrap packages status --missing --quiet; then
      mise bootstrap packages upgrade --manager apt --yes
    fi
    ;;
esac
'''

[bootstrap.hooks.final]
run = '''
case "$(uname)" in
  Darwin)
    task brew:packages:fallbacks
    ;;
  Linux)
    if [ -f /etc/debian_version ]; then
      task debian:tools:extras:install
    elif command -v pacman >/dev/null 2>&1; then
      task arch:tools:extras:install
    fi
    ;;
esac
task dot:skills:sync
'''

[bootstrap.macos.dock]
autohide = true
mru_spaces = false

[bootstrap.macos.keyboard]
key_repeat = 2
initial_key_repeat = 15
press_and_hold = false

[bootstrap.macos.defaults]
"NSGlobalDomain" = { AppleShowAllExtensions = true }
"com.apple.dock" = { showhidden = true }

[dotfiles]
"~/.aliases" = "aliases"
"~/.ctags" = "ctags"
