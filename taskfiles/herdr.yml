# yaml-language-server: $schema=https://taskfile.dev/schema.json
version: 3

vars:
  PLUGINS:
    map:
      gh-pr: 'wyattjoh/herdr-plugin-gh-pr'
  LOCAL_PLUGINS:
    map:
      dotfiles.command-palette: command-palette
      dotfiles.seamless-navigation: seamless-navigation
      dotfiles.workspace-title: workspace-title

tasks:
  sync:
    desc: Configures Herdr integrations and plugins
    cmds:
      - task: raycast:symlink
      - task: plugins:sync

  raycast:symlink:
    desc: Makes the mise-managed Herdr binary discoverable by Raycast
    platforms: [darwin]
    status:
      - test "$(readlink "$HOME/.local/bin/herdr" 2>/dev/null)" = "$HOME/.local/share/mise/shims/herdr"
    cmds:
      - mkdir -p "$HOME/.local/bin"
      - |
        destination="$HOME/.local/bin/herdr"
        if [ -e "$destination" ] && [ ! -L "$destination" ]; then
          echo "$destination exists and is not a symlink; refusing to replace it" >&2
          exit 1
        fi
        ln -sfn "$HOME/.local/share/mise/shims/herdr" "$destination"

  plugins:install:
    desc: Installs Herdr plugins
    cmds:
      - for:
          var: PLUGINS
        cmd: |
          set -eu

          installed="$(herdr plugin list --plugin '{{.KEY}}' --json | jq '.result.plugins | length')"
          if [ "$installed" -eq 0 ]; then
            herdr plugin install '{{.ITEM}}' --yes >/dev/null
          fi
        silent: true

  plugins:sync:
    desc: Installs Herdr plugins and registers repo-managed plugins
    cmds:
      - task: plugins:install
      - for:
          var: LOCAL_PLUGINS
        cmd: |
          set -eu

          plugin="$(realpath './config/herdr/plugins/{{.ITEM}}')"
          herdr plugin unlink '{{.KEY}}' >/dev/null 2>&1 || true
          herdr plugin link "$plugin" >/dev/null
