# yaml-language-server: $schema=https://taskfile.dev/schema.json

version: 3

tasks:
  packages:fallbacks:
    desc: Installs packages unsupported by mise's Homebrew backend
    silent: true
    cmd: |
      # These taps do not publish the API metadata required by mise.
      brew trust --formula \
        dkarter/tap/sudo-touchid \
        morantron/tmux-fingers/tmux-fingers
      brew install \
        dkarter/tap/sudo-touchid \
        morantron/tmux-fingers/tmux-fingers
      # Mise cannot run OrbStack's postflight stanza or identify Raycast's
      # extensionless download URL as an archive.
      for cask in orbstack raycast; do
        if brew list --cask "$cask" >/dev/null 2>&1; then
          brew upgrade --cask --greedy "$cask"
        else
          brew install --cask "$cask"
        fi
      done
