# yaml-language-server: $schema=https://taskfile.dev/schema.json
version: '3'

tasks:
  zsh:default:
    desc: Set zsh as the default shell
    status:
      # check if already set
      - test "$(basename "$SHELL")" = 'zsh'
      # macOS: check Directory Services
      - |
        if [ "$(uname)" = "Darwin" ]; then
          current_user="${USER:-$(id -un)}"
          test "$(dscl . -read /Users/$current_user UserShell | awk '{print $2}' | xargs basename)" = 'zsh'
        else
          current_user="${USER:-$(id -un)}"
          test "$(grep "^$current_user:" /etc/passwd | cut -d: -f7 | xargs basename)" = 'zsh'
        fi
    # will require password
    interactive: true
    cmds:
      - task: zsh:add-to-shells
      - cmd: |
          if [ "$(uname)" = "Darwin" ]; then
            chsh -s "$(command -v zsh)"
          else
            sudo chsh -s "$(command -v zsh)" "${USER:-$(id -un)}"
          fi

  zsh:add-to-shells:
    desc: Add zsh to /etc/shells if not already present
    status:
      - grep -qxF "$(command -v zsh)" /etc/shells
    platforms: [darwin]
    cmds:
      - cmd: echo "$(command -v zsh)" | sudo tee -a /etc/shells
        silent: true
