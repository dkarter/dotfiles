# yaml-language-server: $schema=https://taskfile.dev/schema.json
version: 3

vars:
  PACMAN_PKGS:
    - base-devel
    - bat
    - curl
    - figlet
    - fop
    - ghostty
    - httpie
    - keyd
    - libxslt
    - lsof
    - ncurses
    - postgresql-client
    - tmux
    - tree
    - unixodbc
    - wget
    - wxwidgets
    - zsh

  YAY_PKGS:
    - pspg

tasks:
  sync:
    desc: Installs and updates tools
    platforms: [linux]
    silent: true
    cmds:
      - task: tools:install
        if: 'uname -r | grep -q arch1'

  tools:install:
    desc: Installs all apt packages
    platforms: [linux]
    silent: true
    cmds:
      - cmd: |
          # shellcheck disable=SC1083
          sudo pacman --noconfirm --needed -S {{.PACMAN_PKGS | join " "}}
        if: 'command -v pacman &>/dev/null'
      - cmd: |
          # shellcheck disable=SC1083
          yay --noconfirm --needed -S {{.YAY_PKGS | join " "}}
        if: 'command -v yay &>/dev/null'
      - task: keyd:config

  keyd:config:
    generates:
      - /etc/keyd/default.conf
    silent: true
    cmds:
      - cmd: echo 'Setting up keyd remaps...'
      - cmd: |
          # shellcheck disable=SC1039,SC1073,SC1072,SC1009,SC1040
          sudo tee /etc/keyd/default.conf >/dev/null <<-EOF
          	[ids]
          	*

          	[main]
          	# CapsLock acts as Escape on tap, Control on hold
          	capslock = overload(control, esc)

          	# (Optional) Map physical Esc to `pause` key so we can later remap it to the XCompose key in `~/.config/hypr/input.conf`
          	esc = pause
          	EOF
      - cmd: sudo systemctl enable --now keyd
      - cmd: echo 'done'
