# yaml-language-server: $schema=https://taskfile.dev/schema.json
version: 3

vars:
  YAY_PKGS:
    - pspg

tasks:
  tools:extras:install:
    desc: Installs AUR packages and configures package-provided services
    platforms: [linux]
    cmds:
      - cmd: |
          # shellcheck disable=SC1083
          yay --noconfirm --needed -S {{.YAY_PKGS | join " "}}
        if: 'command -v yay &>/dev/null'
      - task: keyd:config

  keyd:config:
    generates:
      - /etc/keyd/default.conf
    silent: true
    cmds:
      - cmd: echo 'Setting up keyd remaps...'
      - cmd: |
          # shellcheck disable=SC1039,SC1073,SC1072,SC1009,SC1040
          sudo tee /etc/keyd/default.conf >/dev/null <<-EOF
          	[ids]
          	*

          	[main]
          	# CapsLock acts as Escape on tap, Control on hold
          	capslock = overload(control, esc)

          	# esc = pause  # disabled - broken in keyd v2.6.0
          	EOF
      - cmd: |
          if [ -d /run/systemd/system ]; then
            sudo systemctl enable --now keyd
          else
            echo 'Skipping keyd service start (systemd is not running).'
          fi
      - cmd: echo 'done'
