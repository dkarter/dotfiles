# yaml-language-server: $schema=https://taskfile.dev/schema.json
version: 3

tasks:
  commit:
    desc: Commits mise lockfiles if changed
    silent: true
    cmd: |
      set -- \
        './mise.lock' \
        './config/mise/mise.lock' \
        './config/mise/mise.extra.lock'

      if [[ -z "$(git status --porcelain -- "$@")" ]]; then
        echo "No changes in mise lockfiles"
        exit 0
      fi

      git add -- "$@"
      git commit -m 'chore(mise): update lockfiles'

  install:
    desc: Installs mise itself
    silent: true
    # https://mise.jdx.dev/getting-started.html
    cmds:
      - cmd: brew update && brew install mise
        platforms: [darwin]

      - cmd: |
          if command -v mise &>/dev/null; then
            exit 0
          fi

          if [[ -f /etc/debian_version ]] || command -v apt &>/dev/null; then
            sudo apt update -y && sudo apt install -y gpg sudo wget curl
            sudo install -dm 755 /etc/apt/keyrings
            wget -qO - https://mise.jdx.dev/gpg-key.pub | gpg --dearmor | sudo tee /etc/apt/keyrings/mise-archive-keyring.gpg 1> /dev/null
            echo "deb [signed-by=/etc/apt/keyrings/mise-archive-keyring.gpg arch={{ARCH}}] https://mise.jdx.dev/deb stable main" | sudo tee /etc/apt/sources.list.d/mise.list
            sudo apt update
            sudo apt install -y mise
          elif command -v pacman &> /dev/null; then
            sudo pacman --noconfirm --needed -S mise
          fi
        platforms: [linux]

  sync:
    desc: Updates mise tools (runtimes), mise itself and installs packages for this project
    cmds:
      - task: tools:install
      - task: tools:update

  tools:install:
    desc: Installs/updates all mise based tools
    cmds:
      - cmd: |
          mise trust --yes --silent
          # locked is here because despite `mise-version.jdx.dev` largely
          # eliminating the need for a github token for checking attestations,
          # we still need it for resolving `latest` for github backend tools
          mise install --locked

  tools:install:devcontainer:
    desc: Installs mise tools for prebuilt devcontainer images
    cmds:
      - cmd: |
          mise trust --yes --silent

          if [[ -d /mise/installs ]]; then
            echo 'Using preinstalled mise tools from /mise.'
            exit 0
          fi

          case "$(uname -m)" in
            aarch64|arm64)
              export MISE_DISABLE_TOOLS='resvg,github:mazznoer/lolcrab'
              ;;
          esac
          mise install --yes --cd "$HOME"
          mise install --yes

  tools:extras:prompt:
    desc: Prompt to enable optional mise extras profile
    silent: true
    cmds:
      - cmd: |
          if [[ ! -t 0 ]] || [[ ! -t 1 ]]; then
            echo "Skipping extras prompt (non-interactive shell)."
            exit 0
          fi

          if ! mise which gum &>/dev/null; then
            mise install gum
          fi

          zshrc_local="$HOME/.zshrc.local"

          if mise exec -- gum confirm "Install optional extra mise tools?"; then
            touch "$zshrc_local"

            if grep -qE '^[[:space:]]*export[[:space:]]+MISE_ENV=' "$zshrc_local"; then
              sed -i.bak -E 's|^[[:space:]]*export[[:space:]]+MISE_ENV=.*$|export MISE_ENV=extra|' "$zshrc_local"
            else
              printf '\nexport MISE_ENV=extra\n' >> "$zshrc_local"
            fi

            rm -f "$zshrc_local.bak"
            echo "Enabled extras profile via MISE_ENV=extra in $zshrc_local"
          else
            if [[ -f "$zshrc_local" ]]; then
              sed -i.bak -E '/^[[:space:]]*export[[:space:]]+MISE_ENV=extra[[:space:]]*$/d' "$zshrc_local"
              rm -f "$zshrc_local.bak"
            fi
            echo "Keeping base mise toolset only."
          fi

  tools:update:
    desc: Updates all mise based tools
    cmds:
      - cmd: mise up
        silent: true

  tools:outdated:
    desc: List all outdated tools, including major bumps
    cmds:
      - cmd: mise outdated -l
        silent: true
