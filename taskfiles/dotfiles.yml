# yaml-language-server: $schema=https://taskfile.dev/schema.json
version: '3'

includes:
  1password:
    taskfile: ./1password.yaml
    aliases: [op]
    internal: true

  bat:
    taskfile: ./bat.yml
    internal: true

  brew:
    taskfile: ./brew.yml
    dir: ../
    internal: true

  completions:
    taskfile: ./completions.yml
    internal: true

  debian:
    taskfile: ./debian.yml
    internal: true

  arch:
    taskfile: ./arch.yml
    internal: true

  fonts:
    taskfile: ./fonts.yml
    internal: true

  gh:
    taskfile: ./github.yml
    internal: true

  herdr:
    taskfile: ./herdr.yml
    dir: ../
    internal: true

  mac:
    taskfile: ./mac.yml
    internal: true

  mise:
    taskfile: ./mise.yml
    dir: ../
    internal: true

  nvim:
    taskfile: ./nvim.yml
    dir: ../
    internal: true

  shell:
    taskfile: ./shell.yml
    internal: true

  tmux:
    taskfile: ./tmux.yml
    dir: ../
    internal: true

  yazi:
    taskfile: ./yazi.yml
    dir: ../
    internal: true

  zinit:
    taskfile: ./zinit.yml
    dir: ../
    internal: true

tasks:
  install:
    desc: Install dotfiles
    summary: |
      Install dotfiles

      Installs all dependencies and symlink dotfiles.
    silent: true
    cmds:
      - task: debian:sync
      - task: arch:sync
      - task: shell:zsh:default
      - task: create:dirs
      - task: mise:install
      - task: symlink
      - task: op:install:ssh:agent
      - task: zinit:install
      - task: zinit:plugins:update
      - task: mac:set:defaults
      - task: mise:tools:extras:prompt
      - task: mise:tools:install
      - task: herdr:sync
      - task: fonts:sync
      - task: brew:sync
      - task: bat:sync
      - task: tmux:plugins:install
      - task: gh:plugins:install
      - task: yazi:install
      # completions needs the tools to be installed
      - task: completions:sync
      - task: print:done
      - cmd: |
          mise exec -- glow docs/post_install.md

  install:devpod:
    desc: Install dotfiles in a Devpod/devcontainer container
    summary: |
      Install dotfiles in a Devpod/devcontainer container.

      Container setup runs non-interactively and may use linux/arm64 images where
      some personal mise tools are unavailable. Keep this path to shell setup,
      symlinks, and container-safe dependencies.
    silent: true
    cmds:
      - task: debian:tools:install:devcontainer
      - task: shell:zsh:default
      - task: create:dirs
      - task: mise:install
      - task: symlink
      - task: op:install:ssh:agent
      - task: zinit:install
      - task: mise:tools:install:devcontainer
      - task: zinit:plugins:warm
      - task: nvim:install
      - task: print:done

  sync:
    desc: Synchronize dotfiles
    summary: |
      Synchronize dotfiles

      Use this task to get the latest tool versions and configuration changes
      after pulling the repo
    cmds:
      - task: debian:sync
      - task: arch:sync
      - task: create:dirs
      - task: symlink
      - task: mise:sync
      - task: herdr:sync
      - task: brew:sync
      - task: bat:sync
      - task: tmux:sync
      - task: zinit:sync
      - task: gh:sync
      - task: fonts:sync
      - task: mac:sync
      - task: yazi:sync
      # completions needs the tools to be installed
      - task: completions:sync
      - task: print:done

  create:dirs:
    desc: Creates directories for dotfiles
    vars:
      DIRS:
        - '~/.cache/zsh/completions'
        - '~/.config'
        - '~/.config/claude'
        - '~/.local/share/psql'
    cmds:
      - cmd: mkdir -p {{.DIRS | join " "}}
        # we don't care about failures if they already exist
        ignore_error: true

  symlink:
    desc: Symlinks dotfiles and folders
    cmds:
      - mise bootstrap dotfiles apply --yes
      - task: skills:sync

  skills:sync:
    desc: Synchronizes repo and local skills into global skill directories
    cmds:
      - cmd: |
          set -eu

          repo_agents="$(realpath ./agents)"
          repo_skills="$(realpath ./agents/skills)"
          local_skills="$HOME/.local/share/dotfiles/skills"
          skill_dests="$HOME/.agents/skills $HOME/.claude/skills"

          mkdir -p "$local_skills" "$HOME/.claude"

          symlink_target() {
            realpath "$1" 2>/dev/null || readlink "$1" 2>/dev/null || true
          }

          ensure_skill_dir() {
            path="$1"
            old_target="$2"

            if [ -L "$path" ]; then
              target="$(symlink_target "$path")"
              if [ "$target" = "$old_target" ]; then
                rm "$path"
              else
                echo "$path is a symlink to $target; refusing to replace it" >&2
                exit 1
              fi
            elif [ -e "$path" ] && [ ! -d "$path" ]; then
              echo "$path exists and is not a directory" >&2
              exit 1
            fi

            mkdir -p "$path"
          }

          is_managed_skill_target() {
            target="$1"

            case "$target" in
              "$repo_skills"/*|"$local_skills"/*)
                return 0
                ;;
              *)
                return 1
                ;;
            esac
          }

          ensure_skill_dir "$HOME/.agents" "$repo_agents"
          ensure_skill_dir "$HOME/.agents/skills" ""
          ensure_skill_dir "$HOME/.claude/skills" "$repo_skills"

          cleanup_stale_skill_links() {
            dest="$1"

            for entry in "$dest"/*; do
              [ -L "$entry" ] || continue

              target="$(symlink_target "$entry")"
              is_managed_skill_target "$target" || continue

              skill_name="$(basename "$entry")"
              if [ ! -d "$repo_skills/$skill_name" ] && [ ! -d "$local_skills/$skill_name" ]; then
                rm "$entry"
              fi
            done
          }

          validate_skill_dest() {
            dest="$1"
            skill="$2"

            skill_name="$(basename "$skill")"
            skill_target="$(realpath "$skill")"
            dest_path="$dest/$skill_name"

            if [ -L "$dest_path" ]; then
              target="$(symlink_target "$dest_path")"
              if [ "$target" = "$skill_target" ]; then
                return 0
              fi

              if ! is_managed_skill_target "$target"; then
                echo "$dest_path is a symlink to $target; refusing to replace it" >&2
                exit 1
              fi
            elif [ -e "$dest_path" ]; then
              echo "$dest_path exists and is not a managed symlink" >&2
              exit 1
            fi
          }

          for_effective_skills() {
            action="$1"
            source="$2"

            [ -d "$source" ] || return 0

            for skill in "$source"/*; do
              [ -d "$skill" ] || continue

              skill_name="$(basename "$skill")"
              if [ "$source" = "$repo_skills" ] && [ -d "$local_skills/$skill_name" ]; then
                continue
              fi

              "$action" "$skill"
            done
          }

          validate_skill() {
            skill="$1"

            for dest in $skill_dests; do
              validate_skill_dest "$dest" "$skill"
            done
          }

          install_skill() {
            skill="$1"

            skill_name="$(basename "$skill")"
            skill_target="$(realpath "$skill")"
            if [ "$(dirname "$skill")" = "$local_skills" ]; then
              echo "Installing skill $skill_name (local)"
            else
              echo "Installing skill $skill_name"
            fi

            for dest in $skill_dests; do
              dest_path="$dest/$skill_name"
              if [ -L "$dest_path" ] && [ "$(symlink_target "$dest_path")" = "$skill_target" ]; then
                continue
              fi

              ln -sfn "$skill_target" "$dest_path"
            done
          }

          for_effective_skills validate_skill "$repo_skills"
          # Local skills intentionally override repo skills with the same name.
          for_effective_skills validate_skill "$local_skills"

          for dest in $skill_dests; do
            cleanup_stale_skill_links "$dest"
          done

          for_effective_skills install_skill "$repo_skills"
          for_effective_skills install_skill "$local_skills"
        silent: true

  leaks:
    desc: Checks for secret leaks across the history of this project
    cmd: gitleaks git -v --redact -b gitleaks-report.json

  fmt:
    desc: Format all formattable files
    aliases: [format]
    cmd: dprint fmt

  fmt:check:precommit:
    desc: Checks formatting for precommit hooks (just staged)
    aliases: [format:check:precommit]
    cmd: |
      staged_files="$(mktemp)"
      trap 'rm -f "$staged_files"' EXIT

      git diff --cached --name-only --diff-filter=d -z > "$staged_files"

      if [ ! -s "$staged_files" ]; then
        echo "No staged files to format-check."
        exit 0
      fi

      xargs -0 dprint check --allow-no-files < "$staged_files"

  print:done:
    desc: Prints done with a cool font and some nice gradients (animated)
    internal: true
    cmd: |
      if command -v figlet >/dev/null 2>&1 && command -v lolcrab >/dev/null 2>&1; then
        if echo DONE | figlet | lolcrab -a --speed 1 --duration 1 --gradient warm; then
          exit 0
        fi
      fi

      echo DONE
    silent: true
